<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title> Meus Dados </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="voltarMenu()" color="light">
        Voltar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="ion-text-center ion-margin-bottom">
    <ion-icon name="person-circle-outline" size="large" color="danger">
    </ion-icon>
    <h2>{{ cliente.nome }}</h2>
  </div>

  <ion-card>
    <ion-card-header>
      <ion-card-title> Informações do Cliente </ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label>
          <h3>Matrícula</h3>
          <p>{{ cliente.matricula }}</p>
        </ion-label>
      </ion-item>

      <ion-item>
        <ion-label>
          <h3>E-mail</h3>
          <p>{{ cliente.email }}</p>
        </ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title> Saldo Total </ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <div class="ion-text-center">
        <p>A conta possui um saldo total de:</p>
        <h1 color="danger">R$ {{ saldoTotal | number:'1.2-2' }}</h1>
        </div>
    </ion-card-content>
  </ion-card>
</ion-content>
